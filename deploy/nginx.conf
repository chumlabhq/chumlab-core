# /etc/nginx/sites-available/api.chumlab.com.conf
#
# Initial HTTP-only config. `certbot --nginx` rewrites this in place to add
# the SSL listener + auto-redirect once the cert is issued.

server {
    listen 80;
    listen [::]:80;
    server_name api.chumlab.com;

    # Proxy upload size cap. The chumlab-be app caps express.json at 1mb,
    # so 2m here is plenty of headroom for headers + body.
    client_max_body_size 2m;

    # Real IP forwarding. The Express app already has `app.set('trust proxy', 1)`
    # which means it trusts X-Forwarded-For populated by exactly one upstream
    # (this nginx). Don't add more proxies in front without bumping that.
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-friendly upgrade headers - harmless for plain HTTP.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Block hidden files (e.g. accidental .git, .env exposure if ever served).
    location ~ /\. {
        deny all;
    }
}
